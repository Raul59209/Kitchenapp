version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kitchen-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kitchen
      MYSQL_USER: kitchen
      MYSQL_PASSWORD: kitchen
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: